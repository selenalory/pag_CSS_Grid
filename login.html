<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Selena Lory</title>
    <link rel="icon" type="image/png" href="img/aba1.png">
    <link rel="stylesheet" href="style.css">
</head>

<body class="pagina-login">

    <!-- CABEÇALHO -->
    <header class="login-header">
        <div class="login-header-inner">
            <div class="header-profile">
                <img src="img/perfil1.png" alt="Foto de perfil">
                <div>
                    <h1>Selena Lory</h1>
                    <p>Software Engineering Student</p>
                    <span class="linha-dourada"></span>
                </div>
            </div>
        </div>
    </header>

    <!-- LAYOUT PRINCIPAL: barra lateral + conteúdo -->
    <main class="layout-grid">

        <!-- Menu lateral -->
        <aside class="menu-lateral">
            <h3>Navegação</h3>
            <a href="index.html">Início</a>
            <a href="index.html#sobre">Sobre</a>
            <a href="index.html#projetos">Projetos</a>
            <a href="index.html#contato">Contato</a>
        </aside>

        <!-- Conteúdo principal: formulário de login -->
        <div class="conteudo-principal">

            <section class="login-section">
                <h2>Login</h2>
                <span class="titulo-linha"></span>

                <!-- Seção de cards com informações -->
                <div class="login-cards">

                    <div class="login-info-card">
                        <h3>Portfólio Completo</h3>
                        <p>Visualize todos os projetos, incluindo trabalhos em desenvolvimento.</p>
                    </div>

                </div>

                <!-- Formulário de login -->
                <div class="login-form-container">
                    <form class="login-form">

                        <div class="form-grupo">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" placeholder="seu@email.com" required>
                        </div>

                        <div class="form-grupo">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" placeholder="••••••••" required>
                        </div>

                        <button type="submit">Entrar</button>

                        <a href="index.html" class="login-voltar">← Voltar ao portfólio</a>

                    </form>
                </div>

            </section>

        </div>

    </main>

    <!-- RODAPÉ -->
    <footer>
        <p>© 2026 Selena Lory — Desenvolvido com HTML e CSS Grid. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
